<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>いろあわせパズル</title>
<style>
  :root {
    --bg: #FBF7F0;
    --panel: #FFFFFF;
    --ink: #2B2620;
    --sub: #6B6155;
    --line: #E4DAC9;
    --accent: #3E7CB1;
    --accent-ink: #FFFFFF;
    --c-red: #E5645C;
    --c-yellow: #F2C14E;
    --c-green: #6BAE6B;
    --c-blue: #5B9BD5;
    --c-purple: #A583C4;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                 "Yu Gothic", "Meiryo", sans-serif;
    height: 100%;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px 12px 16px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 4px 12px;
  }

  .title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .score-box {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 8px 16px;
    text-align: center;
    min-width: 110px;
  }
  .score-label { font-size: 15px; color: var(--sub); font-weight: 700; }
  .score-num { font-size: 30px; font-weight: 800; line-height: 1.1; }

  .board-frame {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .board {
    background: var(--panel);
    border: 3px solid var(--line);
    border-radius: 20px;
    padding: 8px;
    display: grid;
    gap: 5px;
    touch-action: manipulation;
    box-shadow: 0 6px 0 rgba(0,0,0,0.04);
  }

  .cell {
    border-radius: 12px;
    transition: transform 0.12s ease, opacity 0.18s ease;
    cursor: pointer;
  }
  .cell.empty { background: transparent; cursor: default; box-shadow: none; }
  .cell.c1 { background: var(--c-red); }
  .cell.c2 { background: var(--c-yellow); }
  .cell.c3 { background: var(--c-green); }
  .cell.c4 { background: var(--c-blue); }
  .cell.c5 { background: var(--c-purple); }

  .cell.hint {
    transform: scale(0.86);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.9) inset, 0 0 0 4px var(--ink);
  }
  .cell.pop { transform: scale(0); opacity: 0; }

  footer {
    display: flex;
    gap: 12px;
    padding-top: 14px;
  }

  .btn {
    flex: 1;
    border: none;
    border-radius: 18px;
    padding: 18px 10px;
    font-size: 22px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.08s ease;
  }
  .btn:active { transform: translateY(3px); }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-ink);
    box-shadow: 0 5px 0 #2F5F87;
  }
  .btn-primary:active { box-shadow: 0 2px 0 #2F5F87; }
  .btn-ghost {
    background: var(--panel);
    color: var(--ink);
    border: 2px solid var(--line);
    box-shadow: 0 5px 0 var(--line);
  }
  .btn-ghost:active { box-shadow: 0 2px 0 var(--line); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(43, 38, 32, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay.show { display: flex; }
  .card {
    background: var(--panel);
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    max-width: 380px;
    width: 100%;
  }
  .card h2 { font-size: 30px; margin: 0 0 8px; }
  .card p { font-size: 20px; color: var(--sub); margin: 0 0 4px; line-height: 1.5; }
  .final-score { font-size: 52px; font-weight: 800; margin: 12px 0 20px; color: var(--accent); }
  .card .btn { width: 100%; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">いろあわせ</div>
    <div class="score-box">
      <div class="score-label">とくてん</div>
      <div class="score-num" id="score">0</div>
    </div>
  </header>

  <div class="board-frame">
    <div class="board" id="board"></div>
  </div>

  <footer>
    <button class="btn btn-ghost" id="hintBtn">ヒント</button>
    <button class="btn btn-primary" id="newBtn">はじめから</button>
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2 id="ovTitle">おつかれさま！</h2>
    <p id="ovMsg">これ以上けせません</p>
    <div class="final-score" id="ovScore">0てん</div>
    <button class="btn btn-primary" id="ovBtn">もういちど</button>
  </div>
</div>

<script>
(function () {
  const COLS = 8, ROWS = 10, COLORS = 5;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  let grid = [];        // grid[r][c] = 0(空) or 1..COLORS
  let score = 0;
  let busy = false;

  boardEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

  function sizeBoard() {
    // 画面に収まる正方形セルを計算
    const frame = document.querySelector('.board-frame');
    const availW = frame.clientWidth;
    const availH = frame.clientHeight;
    const gap = 5, pad = 8, border = 3;
    const cellW = (availW - pad * 2 - border * 2 - gap * (COLS - 1)) / COLS;
    const cellH = (availH - pad * 2 - border * 2 - gap * (ROWS - 1)) / ROWS;
    const cell = Math.max(20, Math.floor(Math.min(cellW, cellH)));
    document.querySelectorAll('.cell').forEach(el => {
      el.style.width = cell + 'px';
      el.style.height = cell + 'px';
    });
  }

  function newGame() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) row.push(1 + Math.floor(Math.random() * COLORS));
      grid.push(row);
    }
    score = 0;
    scoreEl.textContent = '0';
    document.getElementById('overlay').classList.remove('show');
    render();
  }

  function render() {
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const v = grid[r][c];
        const cell = document.createElement('div');
        cell.className = 'cell ' + (v === 0 ? 'empty' : 'c' + v);
        cell.dataset.r = r; cell.dataset.c = c;
        if (v !== 0) cell.addEventListener('click', onCellClick);
        boardEl.appendChild(cell);
      }
    }
    sizeBoard();
  }

  function cellAt(r, c) {
    return boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
  }

  // 隣接同色のかたまりを探す
  function findGroup(r, c) {
    const color = grid[r][c];
    if (color === 0) return [];
    const seen = new Set();
    const stack = [[r, c]];
    const group = [];
    while (stack.length) {
      const [cr, cc] = stack.pop();
      const key = cr + ',' + cc;
      if (seen.has(key)) continue;
      if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
      if (grid[cr][cc] !== color) continue;
      seen.add(key);
      group.push([cr, cc]);
      stack.push([cr+1, cc], [cr-1, cc], [cr, cc+1], [cr, cc-1]);
    }
    return group;
  }

  function onCellClick(e) {
    if (busy) return;
    const r = +e.currentTarget.dataset.r;
    const c = +e.currentTarget.dataset.c;
    const group = findGroup(r, c);
    if (group.length < 2) return; // 2個以上でないと消えない

    busy = true;
    // 消えるアニメ
    group.forEach(([gr, gc]) => {
      const el = cellAt(gr, gc);
      if (el) el.classList.add('pop');
    });

    score += group.length * (group.length - 1); // 大きいかたまりほど高得点
    scoreEl.textContent = score;

    setTimeout(() => {
      group.forEach(([gr, gc]) => grid[gr][gc] = 0);
      collapse();
      render();
      busy = false;
      if (isGameOver()) endGame();
    }, 200);
  }

  // 下に詰める → 空の列を左に詰める
  function collapse() {
    // 各列を下方向へ
    for (let c = 0; c < COLS; c++) {
      let write = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] !== 0) {
          grid[write][c] = grid[r][c];
          if (write !== r) grid[r][c] = 0;
          write--;
        }
      }
      for (let r = write; r >= 0; r--) grid[r][c] = 0;
    }
    // 空列を左へ
    let write = 0;
    for (let c = 0; c < COLS; c++) {
      let empty = true;
      for (let r = 0; r < ROWS; r++) if (grid[r][c] !== 0) { empty = false; break; }
      if (!empty) {
        if (write !== c) for (let r = 0; r < ROWS; r++) { grid[r][write] = grid[r][c]; grid[r][c] = 0; }
        write++;
      }
    }
  }

  function hasMoves() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (grid[r][c] !== 0 && findGroup(r, c).length >= 2) return true;
    return false;
  }
  function isGameOver() { return !hasMoves(); }

  function remaining() {
    let n = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c] !== 0) n++;
    return n;
  }

  function endGame() {
    const left = remaining();
    const t = document.getElementById('ovTitle');
    const m = document.getElementById('ovMsg');
    if (left === 0) { t.textContent = 'ぜんぶ消えた！'; m.textContent = 'かんぺきです'; }
    else { t.textContent = 'おつかれさま！'; m.textContent = 'のこり ' + left + 'こ'; }
    document.getElementById('ovScore').textContent = score + 'てん';
    document.getElementById('overlay').classList.add('show');
  }

  // ヒント：消せるかたまりを一つ光らせる
  function showHint() {
    if (busy) return;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] !== 0) {
          const g = findGroup(r, c);
          if (g.length >= 2) {
            g.forEach(([gr, gc]) => {
              const el = cellAt(gr, gc);
              if (el) el.classList.add('hint');
            });
            setTimeout(() => {
              g.forEach(([gr, gc]) => {
                const el = cellAt(gr, gc);
                if (el) el.classList.remove('hint');
              });
            }, 900);
            return;
          }
        }
      }
    }
  }

  document.getElementById('newBtn').addEventListener('click', newGame);
  document.getElementById('ovBtn').addEventListener('click', newGame);
  document.getElementById('hintBtn').addEventListener('click', showHint);
  window.addEventListener('resize', sizeBoard);

  newGame();
})();
</script>
</body>
</html>
